<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Lead Discovery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f172a;
      --surface:    #1e293b;
      --surface-2:  #263347;
      --border:     #334155;
      --border-2:   #475569;
      --accent:     #38bdf8;
      --accent-dim: rgba(56,189,248,.12);
      --accent-glow:rgba(56,189,248,.22);
      --text:       #f1f5f9;
      --text-2:     #94a3b8;
      --text-3:     #64748b;
      --red:        #f87171;
      --red-bg:     rgba(248,113,113,.13);
      --radius:     6px;
      --radius-lg:  10px;
      --font:       'Plus Jakarta Sans', sans-serif;
      --font-head:  'Syne', sans-serif;
      --font-mono:  'DM Mono', monospace;
    }

    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      justify-content: center;
      margin-bottom: 2rem;
      text-decoration: none;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--accent-dim);
      border: 1px solid rgba(56,189,248,.25);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .brand-name {
      font-family: var(--font-head);
      font-size: .9rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }

    .card-title {
      font-family: var(--font-head);
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: .3rem;
    }
    .card-sub {
      font-size: .85rem;
      color: var(--text-2);
      margin-bottom: 1.75rem;
    }

    /* Form */
    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .form-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      padding: .6em .85em;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder { color: var(--text-3); }

    /* Error */
    .alert-error {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(248,113,113,.25);
      border-radius: var(--radius);
      padding: .7rem .9rem;
      font-size: .85rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #06090f;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: .9rem;
      font-weight: 700;
      padding: .65em 1em;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: .4rem;
      letter-spacing: .02em;
    }
    .btn-submit:hover { background: #7dd3fc; }
    .btn-submit:active { transform: scale(.98); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .footer-note {
      text-align: center;
      font-size: .78rem;
      color: var(--text-3);
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="3" fill="currentColor"/>
        <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.2" fill="none" opacity=".45"/>
        <circle cx="9" cy="9" r="9.5" stroke="currentColor" stroke-width=".8" fill="none" opacity=".2" transform="scale(.94) translate(.54 .54)"/>
        <line x1="9" y1="0" x2="9" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
        <line x1="18" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
      </svg>
    </div>
    <span class="brand-name">Lead Discovery</span>
  </div>

  <div class="card">
    <div class="card-title">Sign in</div>
    <div class="card-sub">Enter your credentials to access the dashboard.</div>

    {% if error %}
    <div class="alert-error">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="currentColor" stroke-width="1.2"/><line x1="7.5" y1="4" x2="7.5" y2="8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="7.5" cy="11" r=".8" fill="currentColor"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               autocomplete="username" autofocus
               placeholder="your username">
      </div>

      <div class="form-group" style="margin-bottom:1.5rem">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               autocomplete="current-password"
               placeholder="••••••••">
      </div>

      <button type="submit" class="btn-submit">Sign in →</button>
    </form>
  </div>

  <div class="footer-note">Internal tool — authorised access only.</div>

</div>

</body>
</html>
