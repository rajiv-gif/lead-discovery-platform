<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lead Discovery{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface-2: #263347;
      --surface-3: #2e3f58;
      --border:    #334155;
      --border-2:  #475569;
      --accent:    #38bdf8;
      --accent-dim: rgba(56,189,248,.12);
      --accent-glow: rgba(56,189,248,.22);
      --text:      #f1f5f9;
      --text-2:    #94a3b8;
      --text-3:    #64748b;
      --hot:       #fb7185;
      --hot-bg:    rgba(251,113,133,.13);
      --warm:      #fbbf24;
      --warm-bg:   rgba(251,191,36,.13);
      --cold:      #60a5fa;
      --cold-bg:   rgba(96,165,250,.13);
      --dq:        #4a5568;
      --dq-bg:     rgba(74,85,104,.18);
      --green:     #34d399;
      --green-bg:  rgba(52,211,153,.13);
      --red:       #f87171;
      --red-bg:    rgba(248,113,113,.13);
      --radius:    6px;
      --radius-lg: 10px;
      --font:      'Plus Jakarta Sans', sans-serif;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ---------- NAV ---------- */
    .site-nav {
      border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 52px;
    }
    .nav-brand {
      font-family: var(--font-head);
      font-size: .85rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .nav-brand svg { flex-shrink: 0; }
    .nav-links { display: flex; gap: 1.5rem; margin-left: auto; }
    .nav-links a {
      color: var(--text-2);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
      transition: color .15s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ---------- LAYOUT ---------- */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ---------- TYPOGRAPHY ---------- */
    h1, h2, h3 { font-family: var(--font-head); font-weight: 700; line-height: 1.2; }
    h1 { font-size: 1.75rem; }
    h2 { font-size: 1.35rem; }
    h3 { font-size: 1.05rem; }

    /* ---------- BADGES ---------- */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .3em;
      padding: .2em .65em;
      border-radius: 4px;
      font-size: .72rem;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-hot          { background: var(--hot-bg);   color: var(--hot); }
    .badge-warm         { background: var(--warm-bg);  color: var(--warm); }
    .badge-cold         { background: var(--cold-bg);  color: var(--cold); }
    .badge-disqualified { background: var(--dq-bg);    color: var(--dq); }
    .badge-draft        { background: var(--dq-bg);    color: var(--text-2); }
    .badge-active       { background: var(--green-bg); color: var(--green); }
    .badge-approved     { background: var(--green-bg); color: var(--green); }
    .badge-rejected     { background: var(--red-bg);   color: var(--red); }
    .badge-needs_edit   { background: var(--warm-bg);  color: var(--warm); }
    .badge-pending      { background: var(--accent-dim); color: var(--accent); }

    /* ---------- BUTTONS ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4em;
      padding: .5em 1.1em;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
      border: none;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: var(--accent);
      color: #06090f;
    }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-2);
    }
    .btn-secondary:hover { background: var(--surface-3); }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border-2); }
    .btn-green  { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,.3); }
    .btn-green:hover  { background: rgba(52,211,153,.22); }
    .btn-red    { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,113,113,.3); }
    .btn-red:hover    { background: rgba(248,113,113,.22); }
    .btn-amber  { background: var(--warm-bg);  color: var(--warm);  border: 1px solid rgba(251,191,36,.3); }
    .btn-amber:hover  { background: rgba(251,191,36,.22); }
    .btn:disabled, .btn[disabled] {
      opacity: .35;
      cursor: not-allowed;
      transform: none;
    }
    .btn-sm { padding: .3em .75em; font-size: .8rem; }

    /* ---------- CARDS ---------- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    /* ---------- FORMS ---------- */
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .form-input, .form-select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      padding: .55em .85em;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-select option { background: var(--surface-2); }
    .form-hint {
      font-size: .78rem;
      color: var(--text-3);
      margin-top: .3rem;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }

    /* ---------- TABLE ---------- */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }
    .data-table th {
      text-align: left;
      padding: .6rem 1rem;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: .7rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface-2); }
    .data-table .mono { font-family: var(--font-mono); font-size: .82rem; }

    /* ---------- ALERTS ---------- */
    .alert {
      padding: .8rem 1rem;
      border-radius: var(--radius);
      font-size: .88rem;
      margin-bottom: 1rem;
    }
    .alert-error   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,113,113,.25); }
    .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
    .alert code { font-family: var(--font-mono); font-size: .8em; word-break: break-all; display: block; margin-top: .4rem; opacity: .85; }

    /* ---------- SCORE ---------- */
    .score-num {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 500;
      line-height: 1;
    }
    .score-bar-track {
      height: 4px;
      background: var(--surface-3);
      border-radius: 2px;
      overflow: hidden;
      margin-top: .35rem;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s ease;
    }

    /* ---------- MISC ---------- */
    .running-indicator { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .muted { color: var(--text-2); }
    .mono  { font-family: var(--font-mono); }
    .page-back {
      display: inline-flex;
      align-items: center;
      gap: .3em;
      color: var(--text-2);
      text-decoration: none;
      font-size: .85rem;
      margin-bottom: 1.5rem;
    }
    .page-back:hover { color: var(--text); }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .lead-card--approved { opacity: .45; }
    .lead-card--rejected { opacity: .35; }
    .lead-card { transition: opacity .3s; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="3" fill="currentColor"/>
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.2" fill="none" opacity=".45"/>
          <circle cx="9" cy="9" r="9.5" stroke="currentColor" stroke-width=".8" fill="none" opacity=".2" transform="scale(.94) translate(.54 .54)"/>
          <line x1="9" y1="0" x2="9" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
          <line x1="18" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
        </svg>
        Lead Discovery
      </a>
      <div class="nav-links">
        <a href="/">Campaigns</a>
        <form method="post" action="/logout" style="display:inline">
          <button type="submit"
                  style="background:none;border:none;cursor:pointer;color:var(--text-3);font-size:.82rem;font-family:var(--font);font-weight:500;padding:.2rem .4rem;border-radius:4px;transition:color .15s"
                  onmouseover="this.style.color='var(--text)'"
                  onmouseout="this.style.color='var(--text-3)'">
            Sign out
          </button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
  // Intercept hx-confirm and show inline Yes/No instead of the browser dialog
  document.addEventListener('htmx:confirm', function (e) {
    if (!e.detail.question) return;
    e.preventDefault();

    const trigger = e.detail.elt;

    // Remove any existing inline confirm
    const prev = document.getElementById('inline-confirm');
    if (prev) prev.remove();

    const el = document.createElement('span');
    el.id = 'inline-confirm';
    el.style.cssText = 'display:inline-flex;align-items:center;gap:.45rem;flex-wrap:wrap';
    el.innerHTML =
      '<span style="font-size:.82rem;color:var(--text-2)">' + e.detail.question + '</span>' +
      '<button id="inline-confirm-yes" class="btn btn-primary btn-sm">Yes</button>' +
      '<button id="inline-confirm-no"  class="btn btn-ghost   btn-sm">No</button>';

    trigger.insertAdjacentElement('afterend', el);
    trigger.style.display = 'none';

    function restore() {
      el.remove();
      trigger.style.display = '';
    }

    document.getElementById('inline-confirm-yes').onclick = function () {
      restore();
      e.detail.issueRequest(true);
    };
    document.getElementById('inline-confirm-no').onclick = restore;
    document.addEventListener('keydown', function esc(ev) {
      if (ev.key === 'Escape') { restore(); document.removeEventListener('keydown', esc); }
    });
  });
  </script>

</body>
</html>
