<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Leadry{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* surface */
      --paper:      #0b0c0f;
      --paper-2:    #14161b;
      --paper-3:    #1c1f26;
      /* borders */
      --rule:       #2a2e36;
      --rule-soft:  #1f232a;
      /* text */
      --ink:        #f1f3f7;
      --ink-2:      #b8bdc7;
      --ink-3:      #7a8090;
      /* accents */
      --accent:     #ff5c2a;
      --accent-dim: rgba(255,92,42,.12);
      --accent-glow:rgba(255,92,42,.22);
      --good:       #6ee7a4;
      --good-dim:   rgba(110,231,164,.12);
      --warn:       #f5c451;
      --warn-dim:   rgba(245,196,81,.13);
      /* score bands */
      --hot:        #ff5c2a;
      --hot-bg:     rgba(255,92,42,.12);
      --warm:       #f5c451;
      --warm-bg:    rgba(245,196,81,.12);
      --cold:       #7a8090;
      --cold-bg:    rgba(122,128,144,.12);
      --dq:         #4a5060;
      --dq-bg:      rgba(74,80,96,.18);
      --green:      #6ee7a4;
      --green-bg:   rgba(110,231,164,.12);
      --red:        #f87171;
      --red-bg:     rgba(248,113,113,.12);
      /* radii */
      --r:          6px;
      --r-lg:       10px;
      /* fonts */
      --display: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
      --sans:    "Inter", "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
      --mono:    "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    html { font-size: 15px; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: "ss01","kern","liga";
      overflow-x: hidden;
      position: relative;
    }

    /* Dot-grid + radial gradient overlays — matches Leadry landing */
    body::before {
      content: "";
      position: fixed;
      inset: -10vh -10vw;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(60% 40% at 18% 0%, rgba(255,92,42,.08), transparent 60%),
        radial-gradient(50% 35% at 85% 8%, rgba(110,231,164,.04), transparent 60%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.03) 1px, transparent 0);
      background-size: 24px 24px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.6), rgba(0,0,0,0) 60%);
      -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,.6), rgba(0,0,0,0) 60%);
    }
    .site-nav, main, footer { position: relative; z-index: 1; }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
    img, svg { display: block; max-width: 100%; }
    ::selection { background: var(--accent); color: var(--paper); }

    /* ─── NAV ──────────────────────────────────────────── */
    .site-nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,12,15,.75);
      backdrop-filter: saturate(140%) blur(14px);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      border-bottom: 1px solid var(--rule-soft);
    }
    .nav-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 54px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    /* Letter-mark square with orange dot — Leadry "L" */
    .nav-mark {
      width: 24px; height: 24px;
      background: var(--ink);
      border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--display); font-weight: 700; font-size: 13px;
      letter-spacing: -0.04em;
      color: var(--paper);
      position: relative;
      flex-shrink: 0;
    }
    .nav-mark::after {
      content: "";
      position: absolute; right: -3px; bottom: -3px;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 0 2px var(--paper);
    }
    .nav-word {
      font-family: var(--display);
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.035em;
      color: var(--ink);
    }
    .nav-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: 2px;
    }
    .nav-links { display: flex; gap: 28px; margin-left: auto; }
    .nav-links a {
      font-size: 14px;
      color: var(--ink-2);
      transition: color .15s;
    }
    .nav-links a:hover { color: var(--ink); }
    .nav-sign-out {
      font-size: 13px;
      font-family: var(--sans);
      font-weight: 500;
      color: var(--ink-3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color .15s;
    }
    .nav-sign-out:hover { color: var(--ink-2); }
    @media (max-width: 700px) {
      .nav-links { display: none; }
      .nav-meta  { display: none; }
    }

    /* ─── LAYOUT ───────────────────────────────────────── */
    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 2.5rem 24px;
    }

    /* ─── TYPOGRAPHY ───────────────────────────────────── */
    h1 {
      font-family: var(--display);
      font-weight: 600;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    h2 {
      font-family: var(--display);
      font-weight: 600;
      font-size: 20px;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }
    h3 {
      font-family: var(--display);
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.02em;
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .muted  { color: var(--ink-2); }
    .dim    { color: var(--ink-3); }
    .mono   { font-family: var(--mono); }

    /* ─── BADGES ───────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .3em;
      padding: 3px 9px;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--rule);
    }
    .badge .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .badge-hot          { background: var(--hot-bg);   color: var(--hot);    border-color: rgba(255,92,42,.25); }
    .badge-hot .dot     { background: var(--hot); box-shadow: 0 0 0 2px rgba(255,92,42,.2); }
    .badge-warm         { background: var(--warm-bg);  color: var(--warm);   border-color: rgba(245,196,81,.25); }
    .badge-warm .dot    { background: var(--warm); }
    .badge-cold         { background: var(--cold-bg);  color: var(--cold);   border-color: rgba(122,128,144,.2); }
    .badge-cold .dot    { background: var(--cold); }
    .badge-disqualified { background: var(--dq-bg);    color: var(--ink-3);  border-color: var(--rule-soft); }
    .badge-draft        { background: var(--paper-2);  color: var(--ink-3);  border-color: var(--rule); }
    .badge-active       { background: var(--good-dim); color: var(--good);   border-color: rgba(110,231,164,.25); }
    .badge-active .dot  { background: var(--good); box-shadow: 0 0 0 2px rgba(110,231,164,.2); }
    .badge-approved     { background: var(--good-dim); color: var(--good);   border-color: rgba(110,231,164,.25); }
    .badge-rejected     { background: var(--red-bg);   color: var(--red);    border-color: rgba(248,113,113,.25); }
    .badge-needs_edit   { background: var(--warn-dim); color: var(--warn);   border-color: rgba(245,196,81,.25); }
    .badge-pending      { background: var(--accent-dim); color: var(--accent); border-color: rgba(255,92,42,.2); }

    /* ─── BUTTONS ──────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.005em;
      border-radius: var(--r);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s, transform .1s;
    }
    .btn:hover { background: var(--paper-2); border-color: var(--ink-3); }
    .btn:active { transform: scale(.97); }
    .btn .arrow { transition: transform .2s ease; }
    .btn:hover .arrow { transform: translateX(3px); }

    .btn-primary {
      background: var(--ink); color: var(--paper); border-color: var(--ink);
    }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .btn-accent {
      background: var(--accent-dim); color: var(--accent); border-color: rgba(255,92,42,.3);
    }
    .btn-accent:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .btn-ghost { background: transparent; color: var(--ink-2); border-color: var(--rule); }
    .btn-ghost:hover { color: var(--ink); border-color: var(--ink-3); background: var(--paper-2); }

    .btn-green { background: var(--good-dim); color: var(--good); border-color: rgba(110,231,164,.28); }
    .btn-green:hover { background: rgba(110,231,164,.2); }
    .btn-red   { background: var(--red-bg);  color: var(--red);  border-color: rgba(248,113,113,.28); }
    .btn-red:hover   { background: rgba(248,113,113,.2); }
    .btn-amber { background: var(--warn-dim); color: var(--warn); border-color: rgba(245,196,81,.28); }
    .btn-amber:hover { background: rgba(245,196,81,.2); }

    .btn:disabled, .btn[disabled] { opacity: .35; cursor: not-allowed; transform: none; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ─── CARDS ────────────────────────────────────────── */
    .card {
      background: var(--paper-2);
      border: 1px solid var(--rule);
      border-radius: var(--r-lg);
      padding: 20px 24px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    /* ─── FORMS ────────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--ink-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%;
      background: var(--paper-3);
      border: 1px solid var(--rule);
      border-radius: var(--r);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .form-input::placeholder { color: var(--ink-3); }
    .form-select option { background: var(--paper-2); }
    .form-hint {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 5px;
      font-family: var(--mono);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }

    /* ─── TABLE ────────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .data-table th {
      text-align: left;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      border-bottom: 1px solid var(--rule);
    }
    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--rule-soft);
      vertical-align: middle;
      color: var(--ink-2);
    }
    .data-table td strong { color: var(--ink); font-weight: 500; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,.02); }
    .data-table .mono { font-family: var(--mono); font-size: 12px; }

    /* ─── ALERTS ───────────────────────────────────────── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--r);
      font-size: 13px;
      margin-bottom: 16px;
      border: 1px solid var(--rule);
    }
    .alert-error   { background: var(--red-bg);   color: var(--red);   border-color: rgba(248,113,113,.25); }
    .alert-success { background: var(--good-dim);  color: var(--good);  border-color: rgba(110,231,164,.25); }
    .alert code { font-family: var(--mono); font-size: .8em; word-break: break-all; display: block; margin-top: 6px; opacity: .8; }

    /* ─── SCORE ────────────────────────────────────────── */
    .score-num {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
    }
    .score-bar-track {
      height: 3px;
      background: var(--paper-3);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s ease;
    }

    /* ─── PAGE SECTIONS ────────────────────────────────── */
    section { border-top: 1px solid var(--rule-soft); }
    .divider { height: 1px; background: var(--rule-soft); margin: 24px 0; }
    .rule { border: 0; border-top: 1px solid var(--rule); margin: 0; }

    /* ─── MISC ─────────────────────────────────────────── */
    .tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-family: var(--mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink-2); background: var(--paper-2);
    }
    .tag .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 0 3px rgba(255,92,42,.18); }

    .page-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--ink-3);
      font-size: 13px;
      margin-bottom: 24px;
      transition: color .15s;
    }
    .page-back:hover { color: var(--ink-2); }

    .running-indicator { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .lead-card--approved { opacity: .45; }
    .lead-card--rejected { opacity: .35; }
    .lead-card { transition: opacity .3s; }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-mark">L</span>
        <span class="nav-word">Leadry</span>
        <span class="nav-meta">v1.0</span>
      </a>
      <div class="nav-links">
        <a href="/">Campaigns</a>
        <form method="post" action="/logout" style="display:inline">
          <button type="submit" class="nav-sign-out">Sign out</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
  document.addEventListener('htmx:confirm', function (e) {
    if (!e.detail.question) return;
    e.preventDefault();

    const trigger = e.detail.elt;
    const prev = document.getElementById('inline-confirm');
    if (prev) prev.remove();

    const el = document.createElement('span');
    el.id = 'inline-confirm';
    el.style.cssText = 'display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap';
    el.innerHTML =
      '<span style="font-size:12px;color:var(--ink-2)">' + e.detail.question + '</span>' +
      '<button id="inline-confirm-yes" class="btn btn-accent btn-sm">Confirm</button>' +
      '<button id="inline-confirm-no"  class="btn btn-ghost  btn-sm">Cancel</button>';

    trigger.insertAdjacentElement('afterend', el);
    trigger.style.display = 'none';

    function restore() { el.remove(); trigger.style.display = ''; }

    document.getElementById('inline-confirm-yes').onclick = function () { restore(); e.detail.issueRequest(true); };
    document.getElementById('inline-confirm-no').onclick = restore;
    document.addEventListener('keydown', function esc(ev) {
      if (ev.key === 'Escape') { restore(); document.removeEventListener('keydown', esc); }
    });
  });
  </script>

</body>
</html>
